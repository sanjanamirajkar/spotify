<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
<body>
    <div class="login-main">
        <div class="login-content">
            <div class="login-hdr">
                <i class="fa-brands fa-spotify icon-spotify"></i>
                <h1>Log in to Spotify</h1>
            </div>

            <div class="external-login">
                <div class="external-login-btn">
                    <a href="#">
                        <i class="fa-brands fa-google google-btn"></i>
                        <span>Sign up with Google</span>
                    </a>
                </div>

                <div class="external-login-btn">
                    <a href="#">
                        <i class="fa-brands fa-facebook facebook-btn"></i>
                        <span>Sign up with Facebook</span>
                    </a>
                </div>

                <div class="external-login-btn">
                    <a href="#">
                        <i class="fa-brands fa-google google-btn"></i>
                        <span>Sign up with Google</span>
                    </a>
                </div>

                <div class="external-login-btn">
                    <a href="#">
                        <span>Continue With Phone Number</span>
                    </a>
                </div>             
            </div>

            <div class="second-login"></div>
            
            <form action="#" class="login-form">
                <div class="login-input">
                    <label for="login_email">
                        Email address
                    </label>
                    <input type="email" name="login_email" id="login_email">
                </div>
                
                <button class="login-Btns">
                    Continue
                </button>
            </form>

            
            <div class="login-to-signup">
                <span>Dont Have An Account <a href="signup.html"> Sign Up For Spotify</a></span>
            </div>
            <p class="login-terms"> This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.</p>
            
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
