<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>
<body>
    <div class="main-signup">
        <div class="main-contain">
            <div class="main-header">
                <i class="fa-brands fa-spotify icon-spotify"></i>
                <h1>Sign up to start listening</h1>
            </div>

            <form action="#" class="signup-form">
                <div class="signup-input">
                    <label for="signup_email">
                        Email address
                    </label>
                    <input type="email" name="signup_email" id="signup_email">
                </div>
                <div class="signup-link-phone">
                    <a href="#">
                        Use phone number instead
                    </a>
                </div>
                <button class="signupBtns">
                    Next
                </button>
            </form>

            <div class="or-hr">
                <span>OR</span>
            </div>

            <div class="external-signup">
                <div class="external-signup-btn">
                    <a href="#">
                        <i class="fa-brands fa-google google-btn"></i>
                        <span>Sign up with Google</span>
                    </a>
                </div>

                <div class="external-signup-btn">
                    <a href="#">
                        <i class="fa-brands fa-facebook facebook-btn"></i>
                        <span>Sign up with Facebook</span>
                    </a>
                </div>

                <div class="external-signup-btn">
                    <a href="#">
                        <i class="fa-brands fa-apple apple-btn"></i>
                        <span>Sign up with Apple</span>
                    </a>
                </div>
            </div>

            <div class="second-signup"></div>
            <div class="signup-to-login">
                <span>Already have an account? <a href="login.html"> Log in here</a></span>
            </div>
            <p class="signup-terms"> This site is protected by reCAPTCHA and the Google Privacy Policy and Terms of Service apply.</p>
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
